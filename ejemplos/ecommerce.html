<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex,follow" />
<title>Demo - E-Commerce en Operación</title>
<style>
body { margin: 0; background: #020617; color: #0f172a; font-family: "Courier New", monospace; }
.wrapper { max-width: 1120px; margin: auto; padding: 2rem 1.2rem; }
.title { color: #34d399; letter-spacing: .12em; text-align: center; margin-bottom: .5rem; }
.helper { color: #cbd5e1; text-align: center; margin-bottom: 1.4rem; }
.layout { display: grid; grid-template-columns: 1.2fr 1fr; gap: 1rem; }
.panel { background: #f8fafc; border: 1px solid rgba(52,211,153,.4); border-radius: 14px; padding: 1rem; }
.products { display: grid; grid-template-columns: repeat(3, 1fr); gap: .7rem; }
.card { border: 1px solid rgba(148,163,184,.45); border-radius: 10px; padding: .7rem; opacity: .5; transition: .25s; min-height: 110px; background:#ffffff; }
.card.active { opacity: 1; border-color: rgba(52,211,153,.85); background: rgba(16,185,129,.08); }
.name { font-size: .85rem; color: #0f172a; margin-bottom: .3rem; }
.price { font-size: .82rem; color: #047857; }
.stock { font-size: .78rem; color: #334155; }
.stock.low { color: #fda4af; }
.order { white-space: pre-line; font-size: .84rem; line-height: 1.5; min-height: 190px; }
.metrics { margin-top: .8rem; display: grid; grid-template-columns: repeat(3, 1fr); gap: .6rem; }
.metric { border: 1px solid rgba(16,185,129,.3); border-radius: 10px; padding: .6rem; background: #ffffff; }
.metric strong { display: block; color: #047857; font-size: 1rem; margin-bottom: .2rem; }
.back { display: block; text-align: center; margin-top: 1.5rem; color: #cbd5e1; }
@media (max-width: 980px) {
  .layout { grid-template-columns: 1fr; }
  .products { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 620px) {
  .products { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="wrapper">
  <h2 class="title">E-Commerce en Operación</h2>
  <p class="helper">Ejemplo para tienda de ropa: asi lo veria tu equipo comercial en pantalla.</p>

  <div class="layout">
    <div class="panel">
      <h3>Pantalla del equipo - Catalogo activo</h3>
      <div id="products" class="products"></div>
    </div>
    <div class="panel">
      <h3>Pantalla del negocio - Simulacion de venta</h3>
      <div id="orderResult" class="order">Iniciando operación...</div>
      <div class="metrics">
        <div class="metric"><strong id="m1">0</strong>Pedidos procesados</div>
        <div class="metric"><strong id="m2">0%</strong>Checkout completado</div>
        <div class="metric"><strong id="m3">0</strong>Alertas de stock</div>
      </div>
    </div>
  </div>

  <a class="back" href="../index.html">← Volver</a>
</div>

<script>
const items = [
  { name: "Tenis Urbanos", price: 1290, stock: 22 },
  { name: "Sudadera Unisex", price: 890, stock: 8 },
  { name: "Gorra Clasica", price: 450, stock: 3 }
];

function cardHtml(product, active) {
  const low = product.stock <= 5;
  return `
    <div class="card ${active ? "active" : ""}">
      <div class="name">${product.name}</div>
      <div class="price">$${product.price.toLocaleString("es-MX")} MXN</div>
      <div class="stock ${low ? "low" : ""}">
        Stock: ${product.stock} ${low ? "(bajo)" : ""}
      </div>
    </div>
  `;
}

function runDemo() {
  const productsEl = document.getElementById("products");
  const orderResult = document.getElementById("orderResult");

  productsEl.innerHTML = items.map((item) => cardHtml(item, false)).join("");

  const steps = [
    "1) Catálogo cargado con filtros por producto y precio.",
    "2) Cliente agrega Tenis Urbanos y Sudadera al carrito.",
    "3) Checkout completado con pago confirmado.",
    "4) Pedido #EC-2048 creado y enviado a preparación.",
    "5) Inventario actualizado con alerta de stock bajo en Gorra Clasica.",
    "",
    "Resultado:",
    "- Proceso de compra sin fricción.",
    "- Pedido gestionado automáticamente.",
    "- Control de inventario en tiempo real."
  ];

  let out = [];
  steps.forEach((line, i) => {
    setTimeout(() => {
      out.push(line);
      orderResult.textContent = out.join("\n");
      if (i === 0) {
        productsEl.innerHTML = items.map((item) => cardHtml(item, true)).join("");
      }
      if (i === 2) document.getElementById("m2").textContent = "92%";
      if (i === 3) document.getElementById("m1").textContent = "1";
      if (i === 4) document.getElementById("m3").textContent = "1";
    }, i * 320);
  });
}

window.addEventListener("DOMContentLoaded", runDemo);
</script>
</body>
</html>
