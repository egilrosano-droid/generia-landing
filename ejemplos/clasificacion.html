<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex,follow" />
<title>Ejemplo - Clasificación de Información</title>

<style>
body {
    margin: 0;
    background: #020617;
    color: white;
    font-family: "Courier New", monospace;
}

/* CONTENEDOR */
.container {
    max-width: 800px;
    margin: auto;
    padding: 2rem 1.5rem;
    text-align: center;
}

/* TÍTULO */
.title {
    color: #00ffff;
    margin-bottom: 2rem;
    letter-spacing: 0.1em;
}

/* TEXTO EXPLICATIVO */
.helper {
    font-size: 0.9rem;
    color: #aaa;
    margin-bottom: 1rem;
    line-height: 1.5;
}

/* INPUT */
textarea {
    width: 100%;
    height: 140px;
    background: rgba(15,23,42,0.7);
    border: 1px solid rgba(0,255,255,0.2);
    border-radius: 10px;
    padding: 1rem;
    color: white;
    resize: none;
}

/* SELECT */
select {
    width: 100%;
    padding: 0.8rem;
    margin-top: 1rem;
    background: rgba(15,23,42,0.7);
    border: 1px solid rgba(0,255,255,0.3);
    border-radius: 8px;
    color: white;
}

/* BOTÓN (YA CORRECTO) */
.btn {
    display: inline-block;
    margin-top: 1.8rem;

    padding: 1rem 2rem;

    border: 1px solid rgba(0,255,255,0.4);
    border-radius: 12px;

    background: rgba(0,255,255,0.08);

    font-size: 0.9rem;
    letter-spacing: 0.1em;

    cursor: pointer;
    transition: 0.25s;

    color: white;
}

.btn:hover {
    border-color: #00ffff;
    background: rgba(0,255,255,0.15);
    color: #00ffff;
}

/* RESULTADOS */
.result {
    margin-top: 2rem;
    display: grid;
    gap: 1rem;
    text-align: left;
}

.card {
    background: rgba(15,23,42,0.8);
    border: 1px solid rgba(0,255,255,0.2);
    padding: 1rem;
    border-radius: 10px;
}

.card-title {
    color: #00ffff;
    margin-bottom: 0.5rem;
    letter-spacing: 0.08em;
}

/* VOLVER */
.back {
    text-align: center;
    margin-top: 2rem;
    color: #777;
}
</style>
</head>

<body>

<div class="container">

<h2 class="title">Clasificación automática de información</h2>

<p class="helper">
Cada semana puedes copiar y pegar información desde WhatsApp, Excel o notas,
y el sistema la organiza automáticamente.
</p>

<textarea id="input">
cliente juan pendiente pago
factura 1200 enviada
pedido retrasado
cliente maria nueva solicitud
error sistema login
</textarea>

<select id="modo">
    <option value="accion">Ver por tipo de información</option>
    <option value="cliente">Ver por cliente</option>
</select>

<button class="btn" onclick="clasificar()">
Clasificar información
</button>

<div id="output" class="result"></div>

<div class="back">
← <a href="../index.html">Volver</a>
</div>

</div>

<script>
function clasificar() {
    const input = document.getElementById("input").value.toLowerCase();
    const modo = document.getElementById("modo").value;
    const lines = input.split("\n");

    let html = "";

    // 🔹 POR ACCIÓN
    if (modo === "accion") {

        const categorias = {
            Clientes: [],
            Finanzas: [],
            Operaciones: [],
            Soporte: []
        };

        lines.forEach(line => {
            if (line.includes("cliente")) categorias.Clientes.push(line);
            else if (line.includes("factura") || line.includes("pago")) categorias.Finanzas.push(line);
            else if (line.includes("pedido")) categorias.Operaciones.push(line);
            else if (line.includes("error") || line.includes("sistema")) categorias.Soporte.push(line);
        });

        for (let cat in categorias) {
            if (categorias[cat].length === 0) continue;

            html += `<div class="card">
                <div class="card-title">${cat}</div>
                ${categorias[cat].map(i => `<div>- ${i}</div>`).join("")}
            </div>`;
        }
    }

    // 🔹 POR CLIENTE (YA CORREGIDO)
    if (modo === "cliente") {

        const clientes = {};
        let clienteActual = null;

        lines.forEach(line => {

            const match = line.match(/cliente\s+(\w+)/);

            if (match) {
                clienteActual = match[1];

                if (!clientes[clienteActual]) {
                    clientes[clienteActual] = [];
                }

                const limpio = line.replace(`cliente ${clienteActual}`, "").trim();
                if (limpio) clientes[clienteActual].push(limpio);

            } else if (clienteActual) {
                clientes[clienteActual].push(line);
            }
        });

        for (let nombre in clientes) {
            html += `<div class="card">
                <div class="card-title">${nombre.toUpperCase()}</div>
                ${clientes[nombre].map(i => `<div>- ${i}</div>`).join("")}
            </div>`;
        }
    }

    document.getElementById("output").innerHTML = html;
}

window.addEventListener("DOMContentLoaded", clasificar);
</script>

</body>
</html>
