<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Demo - Gestión de Negocio</title>
<style>
body { margin: 0; background: #020617; color: #0f172a; font-family: "Courier New", monospace; }
.wrapper { max-width: 1100px; margin: auto; padding: 2rem 1.2rem; }
.title { color: #f59e0b; text-align: center; letter-spacing: .12em; margin-bottom: .5rem; }
.helper { color: #cbd5e1; text-align: center; margin-bottom: 1.2rem; }
.grid { display: grid; grid-template-columns: 1.1fr 1fr; gap: 1rem; }
.panel { background: #f8fafc; border: 1px solid rgba(245,158,11,.45); border-radius: 14px; padding: 1rem; }
.task { border: 1px solid rgba(148,163,184,.35); border-radius: 10px; padding: .6rem .7rem; margin-bottom: .5rem; opacity: .55; transition: .25s; background:#fff; }
.task.active { opacity: 1; border-color: rgba(245,158,11,.85); background: rgba(245,158,11,.09); }
.task .meta { color: #475569; font-size: .76rem; margin-top: .2rem; }
.summary { white-space: pre-line; font-size: .86rem; line-height: 1.55; min-height: 180px; }
.kpis { display: grid; grid-template-columns: repeat(3, 1fr); gap: .6rem; margin-top: .8rem; }
.kpi { border: 1px solid rgba(245,158,11,.35); border-radius: 10px; padding: .6rem; background: #fff; }
.kpi strong { display: block; color: #b45309; font-size: 1.05rem; margin-bottom: .2rem; }
.back { display: block; text-align: center; color: #cbd5e1; margin-top: 1.6rem; }
@media (max-width: 920px) { .grid { grid-template-columns: 1fr; } .kpis { grid-template-columns: 1fr 1fr; } }
</style>
</head>
<body>
<div class="wrapper">
  <h2 class="title">Gestión de Negocio</h2>
  <p class="helper">Ejemplo para equipo comercial: tablero diario con foco en cierre y seguimiento.</p>

  <div class="grid">
    <div class="panel">
      <h3>Pantalla del equipo - Prioridades del dia</h3>
      <div id="tasks"></div>
    </div>
    <div class="panel">
      <h3>Pantalla de direccion - Resultado operativo</h3>
      <div id="result" class="summary">Organizando tablero comercial...</div>
      <div class="kpis">
        <div class="kpi"><strong id="k1">0</strong>Contactos gestionados</div>
        <div class="kpi"><strong id="k2">0</strong>Cotizaciones enviadas</div>
        <div class="kpi"><strong id="k3">0%</strong>Avance del día</div>
      </div>
    </div>
  </div>

  <a class="back" href="../index.html">← Volver</a>
</div>

<script>
const priorities = [
  { title: "Contactar 12 prospectos activos", meta: "Objetivo: generar reuniones" },
  { title: "Enviar 4 cotizaciones pendientes", meta: "Objetivo: acelerar cierre" },
  { title: "Dar seguimiento a 2 pagos vencidos", meta: "Objetivo: recuperar flujo" },
  { title: "Actualizar estado comercial por cliente", meta: "Objetivo: visibilidad del equipo" }
];

function runDemo() {
  const tasksEl = document.getElementById("tasks");
  tasksEl.innerHTML = priorities
    .map((item) => `<div class="task"><div>${item.title}</div><div class="meta">${item.meta}</div></div>`)
    .join("");

  const cards = document.querySelectorAll(".task");
  cards.forEach((card, i) => {
    setTimeout(() => card.classList.add("active"), i * 260);
  });

  setTimeout(() => {
    document.getElementById("result").textContent = [
      "Resumen ejecutivo:",
      "- Prioridades ordenadas por impacto comercial.",
      "- Seguimiento centralizado por cliente.",
      "- Estado de tareas en una sola pantalla.",
      "",
      "Resultado:",
      "- Operación diaria más clara.",
      "- Mejor control del equipo comercial.",
      "- Mayor velocidad de respuesta al cliente."
    ].join("\n");
    document.getElementById("k1").textContent = "12";
    document.getElementById("k2").textContent = "4";
    document.getElementById("k3").textContent = "86%";
  }, 1200);
}

window.addEventListener("DOMContentLoaded", runDemo);
</script>
</body>
</html>
