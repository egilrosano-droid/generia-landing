<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ejemplo - Captura Inteligente</title>

<style>
body {
    margin: 0;
    background: #020617;
    color: white;
    font-family: "Courier New", monospace;
}

.container {
    max-width: 800px;
    margin: auto;
    padding: 2rem 1.5rem;
    text-align: center;
}

.title {
    color: #00ffff;
    margin-bottom: 2rem;
    letter-spacing: 0.1em;
}

.helper {
    font-size: 0.9rem;
    color: #aaa;
    margin-bottom: 1rem;
    line-height: 1.5;
}

textarea {
    width: 100%;
    height: 160px;
    background: rgba(15,23,42,0.7);
    border: 1px solid rgba(0,255,255,0.2);
    border-radius: 10px;
    padding: 1rem;
    color: white;
    resize: none;
}

.btn {
    display: inline-block;
    margin-top: 1.8rem;
    padding: 1rem 2rem;
    border: 1px solid rgba(0,255,255,0.4);
    border-radius: 12px;
    background: rgba(0,255,255,0.08);
    color: white;
    cursor: pointer;
}

.btn:hover {
    border-color: #00ffff;
    background: rgba(0,255,255,0.15);
}

.result {
    margin-top: 2rem;
    text-align: left;
    background: rgba(15,23,42,0.8);
    border: 1px solid rgba(0,255,255,0.2);
    padding: 1.5rem;
    border-radius: 10px;
    white-space: pre-line;
}

.back {
    margin-top: 2rem;
    color: #777;
}
</style>
</head>

<body>

<div class="container">

<h2 class="title">Captura inteligente de clientes</h2>

<p class="helper">
Pega un mensaje de cliente (WhatsApp, correo o nota)
y el sistema genera una ficha estructurada automáticamente.
</p>

<textarea id="input">
Hola, me interesa una página web para vender productos.
Soy Juan Pérez, tengo una tienda de ropa.
Mi presupuesto es de 20 mil pesos.
Me gustaría que tenga pagos en línea.
</textarea>

<button class="btn" onclick="capturar()">
Generar ficha
</button>

<div id="output" class="result">
Aquí aparecerá la información organizada.
</div>

<button class="btn" onclick="irAPropuesta()">
Continuar → Generar propuesta
</button>

<div class="back">
← <a href="../index.html">Volver</a>
</div>

</div>

<script>

function capturar() {

    const text = document.getElementById("input").value.toLowerCase();

    let nombre = "";
    let negocio = "";
    let necesidad = "";
    let presupuesto = "";
    let requisitos = [];
    let siguientePaso = "";

    // Nombre
    if (text.includes("soy")) {
        const match = text.match(/soy ([a-z\s]+)/);
        if (match) nombre = match[1];
    }

    // Negocio
    if (text.includes("tienda")) negocio = "Tienda";
    else if (text.includes("abogado")) negocio = "Servicios legales";
    else if (text.includes("doctor")) negocio = "Servicios médicos";
    else if (text.includes("restaurante")) negocio = "Restaurante";

    // Necesidad
    if (text.includes("página") || text.includes("web")) {
        necesidad = "Página web";
    }

    if (text.includes("vender")) {
        necesidad += " con ecommerce";
    }

    // Presupuesto
    const money = text.match(/(\d+)/);
    if (money) presupuesto = "$" + money[1] + ",000 MXN";

    // Requisitos
    if (text.includes("pagos en línea")) {
    if (text.includes("no necesito pagos") || text.includes("sin pagos")) {
    
        // no agregar nada
    } else {
        requisitos.push("Pagos en línea");
    }
}
    // 🔥 NUEVO: Siguiente paso
    if (necesidad.includes("ecommerce")) {
        siguientePaso = "Propuesta de ecommerce con integración de pagos.";
    } else if (necesidad.includes("web")) {
        siguientePaso = "Desarrollo de sitio web informativo.";
    } else {
        siguientePaso = "Análisis inicial de requerimientos.";
    }

    let resultado = `
Nombre: ${nombre || "No detectado"}
Negocio: ${negocio || "No especificado"}
Necesidad: ${necesidad || "General"}
Presupuesto: ${presupuesto || "No definido"}
Requisitos: ${requisitos.join(", ") || "Ninguno"}

Siguiente paso:
${siguientePaso}
`;

    document.getElementById("output").innerText = resultado;
}

localStorage.setItem("clienteData", JSON.stringify({
    nombre,
    negocio,
    necesidad,
    presupuesto,
    requisitos
}));

function irAPropuesta() {
    window.location.href = "propuesta.html";
}

</script>

</body>
</html>
