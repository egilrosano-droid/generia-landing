<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Demo - Sistema de Reservas</title>
<style>
body { margin: 0; background: #020617; color: #0f172a; font-family: "Courier New", monospace; }
.wrapper { max-width: 980px; margin: auto; padding: 2rem 1.2rem; }
.title { color: #818cf8; letter-spacing: .12em; margin-bottom: .6rem; text-align: center; }
.helper { color: #cbd5e1; text-align: center; margin-bottom: 1.6rem; }
.panel { background: #f8fafc; border: 1px solid rgba(129,140,248,.45); border-radius: 14px; padding: 1rem; }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
.slot { display:flex; justify-content:space-between; padding:.55rem .7rem; border-radius:10px; border:1px solid rgba(148,163,184,.45); margin-bottom:.5rem; background:#fff; }
.slot.free { border-color: rgba(34,197,94,.45); background: rgba(34,197,94,.08); }
.slot.busy { border-color: rgba(244,63,94,.45); background: rgba(244,63,94,.08); }
.summary { white-space: pre-line; font-size: .86rem; line-height: 1.55; }
.back { display:block; text-align:center; color:#cbd5e1; margin-top:1.6rem; }
@media (max-width: 800px){ .grid{ grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="wrapper">
  <h2 class="title">Sistema de Reservas</h2>
  <p class="helper">Ejemplo para clinica/servicios: asi se veria la agenda operativa del dia.</p>
  <div class="grid">
    <div class="panel">
      <h3>Pantalla del equipo - Agenda de hoy</h3>
      <div id="agenda"></div>
    </div>
    <div class="panel">
      <h3>Pantalla del negocio - Resultado de operacion</h3>
      <div id="result" class="summary">Cargando simulación...</div>
    </div>
  </div>
  <a class="back" href="../index.html">← Volver</a>
</div>
<script>
const slots = [
  { hour: "09:00", name: "Disponible", free: true },
  { hour: "10:00", name: "Carlos M. (Confirmada)", free: false },
  { hour: "11:00", name: "Disponible", free: true },
  { hour: "12:00", name: "Laura P. (Confirmada)", free: false },
  { hour: "16:00", name: "Disponible", free: true }
];

function runDemo() {
  const agenda = document.getElementById("agenda");
  agenda.innerHTML = "";
  slots.forEach((s, i) => {
    setTimeout(() => {
      const row = document.createElement("div");
      row.className = `slot ${s.free ? "free" : "busy"}`;
      row.innerHTML = `<span>${s.hour}</span><span>${s.name}</span>`;
      agenda.appendChild(row);
    }, i * 180);
  });

  setTimeout(() => {
    document.getElementById("result").textContent = [
      "Reservas procesadas: 2 confirmadas",
      "Espacios disponibles: 3",
      "Recordatorios enviados: 2",
      "",
      "Resultado:",
      "- Agenda organizada para el equipo.",
      "- Menos ausencias por recordatorio previo.",
      "- Mejor ocupación del día."
    ].join("\n");
  }, 1200);
}

window.addEventListener("DOMContentLoaded", runDemo);
</script>
</body>
</html>
